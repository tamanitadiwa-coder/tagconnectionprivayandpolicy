:root {
  --bg:        #000000;
  --surface:   #0D0D0D;
  --card:      #111116;
  --border:    rgba(255,255,255,0.07);
  --accent:    #A855F7;
  --accentDim: #7C3AED;
  --accentSoft:rgba(168,85,247,0.12);
  --text:      #FFFFFF;
  --textSub:   #8E8E93;
  --textMuted: #3A3A3C;
  --danger:    #FF453A;
  --success:   #30D158;
  --warning:   #FFD60A;
  --divider:   rgba(255,255,255,0.06);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
}

/* ── LOCK SCREEN ── */
#lockScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.lock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.lock-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 14px var(--accent);
  display: inline-block;
  margin-bottom: 16px;
}

.lock-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}

.lock-sub {
  color: var(--textSub);
  font-size: 14px;
  margin-bottom: 28px;
}

.lock-input {
  width: 100%;
  background: #1C1C1E;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 15px;
  letter-spacing: 3px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}

.lock-input:focus { border-color: var(--accent); }

.lock-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 6px 20px rgba(168,85,247,0.35);
}

.lock-btn:hover  { opacity: 0.88; }
.lock-btn:active { transform: scale(0.97); }

.lock-error {
  color: var(--danger);
  font-size: 13px;
  margin-top: 10px;
  min-height: 18px;
}

/* ── MAIN APP ── */
#app { display: none; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--divider);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}

.topbar-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.topbar-badge {
  background: var(--accentSoft);
  color: var(--accent);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
}

.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--textSub);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

.main {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.stat-card {

}

.stat-value {

.stat-label {
  color: var(--textSub);

}

.copy-btn:hover { color: var(--accent); }

.badge {

  const app = initializeApp(firebaseConfig)

  // ── Password ─────────────────────────────────────────────────

  const ADMIN_PASSWORD = 'Tamani1738!'

  window.checkPassword = () => {
    const val = document.getElementById('pwInput').value
    if (val === ADMIN_PASSWORD) {
      document.getElementById('lockScreen').style.display = 'none'
      document.getElementById('app').style.display = 'block'
      startListening()
    } else {
      const err = document.getElementById('lockError')
      err.textContent = 'Incorrect password. Try again.'
      document.getElementById('pwInput').value = ''
      document.getElementById('pwInput').focus()
    }
  }

  window.logout = () => {
    document.getElementById('app').style.display = 'none'
    document.getElementById('lockScreen').style.display = 'flex'
    document.getElementById('pwInput').value = ''
  }

  // ── State ────────────────────────────────────────────────────
  let allVouchers   = []
  let activeFilter  = 'all'
  let searchQuery   = ''
  let confirmAction = null

  // ── Real-time listener ───────────────────────────────────────
  function startListening() {
    const q = query(collection(db, 'vouchers'), orderBy('createdAt', 'desc'))
    onSnapshot(q, snap => {
      allVouchers = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      updateStats()
      renderTable()
    })
  }

  // ── Stats ────────────────────────────────────────────────────
  function updateStats() {
    const now     = Date.now()
    const total   = allVouchers.length
    const redeemed = allVouchers.filter(v => v.redeemed).length
    const expired  = allVouchers.filter(v => !v.redeemed && v.expiresAt && v.expiresAt.toMillis() < now).length
    const active   = total - redeemed - expired

    document.getElementById('statTotal').textContent    = total
    document.getElementById('statActive').textContent   = active
    document.getElementById('statRedeemed').textContent = redeemed
    document.getElementById('statExpired').textContent  = expired
  }

  // ── Render table ─────────────────────────────────────────────
  function renderTable() {
    const now      = Date.now()
    let filtered   = allVouchers

    if (activeFilter === 'active') {
      filtered = filtered.filter(v => !v.redeemed && (!v.expiresAt || v.expiresAt.toMillis() > now))
    } else if (activeFilter === 'redeemed') {
      filtered = filtered.filter(v => v.redeemed)
    } else if (activeFilter === 'expired') {
      filtered = filtered.filter(v => !v.redeemed && v.expiresAt && v.expiresAt.toMillis() < now)
    }

    if (searchQuery) {
      filtered = filtered.filter(v => v.id.includes(searchQuery.toUpperCase()))
    }

    const tbody = document.getElementById('voucherTableBody')

    if (filtered.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <div class="empty-icon">🎟</div>
            <div class="empty-title">No vouchers found</div>
            <div class="empty-sub">Create your first voucher above</div>
          </div>
        </td></tr>`
      return
    }

    tbody.innerHTML = filtered.map(v => {
      const isExpired = !v.redeemed && v.expiresAt && v.expiresAt.toMillis() < now
      const status    = v.redeemed ? 'redeemed' : isExpired ? 'expired' : 'active'
      const statusLabel = { active: 'Active', redeemed: 'Redeemed', expired: 'Expired' }[status]
      const tierClass   = { Free: 'tier-free', Pro: 'tier-pro', Premium: 'tier-premium' }[v.tier] ?? ''

      const createdStr  = v.createdAt  ? new Date(v.createdAt.toMillis()).toLocaleDateString()  : '—'
      const expiryStr   = v.expiresAt  ? new Date(v.expiresAt.toMillis()).toLocaleDateString()  : '—'
      const redeemedBy  = v.redeemedBy ?? '—'

      return `
        <tr>
          <td>
            <span class="code-cell">${v.id}</span>
            <button class="copy-btn" onclick="copyCode('${v.id}')" title="Copy">⎘</button>
          </td>
          <td><span class="${tierClass}">${v.tier ?? '—'}</span></td>
          <td>
            <span class="badge badge-${status}">
              <span class="badge-dot"></span>${statusLabel}
            </span>
          </td>
          <td style="color:var(--textSub);font-size:13px">${redeemedBy}</td>
          <td style="color:var(--textSub);font-size:13px">${expiryStr}</td>
          <td style="color:var(--textSub);font-size:13px">${createdStr}</td>
          <td>
            ${status === 'active' ? `<button class="action-btn disable" onclick="disableVoucher('${v.id}')">Disable</button>` : ''}
            <button class="action-btn" onclick="confirmDelete('${v.id}')">Delete</button>
          </td>
        </tr>`
    }).join('')
  }

  // ── Create voucher ───────────────────────────────────────────
  window.createVoucher = async () => {
    const code   = document.getElementById('codeInput').value.trim().toUpperCase()
    const tier   = document.getElementById('tierSelect').value
    const expiry = document.getElementById('expiryInput').value

    if (!code) { showToast('⚠ Enter a code first'); return }
    if (!/^[A-Z0-9]+$/.test(code)) { showToast('⚠ Code must be letters and numbers only'); return }

    try {
      const data = {
        tier,
        redeemed:   false,
        redeemedBy: null,
        createdAt:  serverTimestamp(),
        expiresAt:  expiry ? new Date(expiry) : null,
      }

      // Use the code itself as the document ID for easy lookup
      const { setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')
      await setDoc(doc(db, 'vouchers', code), data)

      document.getElementById('codeInput').value  = ''
      document.getElementById('expiryInput').value = ''
      showToast(`✓ Voucher ${code} created`)
    } catch (e) {
      showToast('Error creating voucher')
      console.error(e)
    }
  }

  // ── Bulk generate ────────────────────────────────────────────
  window.bulkGenerate = async () => {
    const count = parseInt(document.getElementById('bulkCount').value) || 10
    const tier  = document.getElementById('bulkTier').value

    if (count > 100) { showToast('Max 100 at a time'); return }

    const { setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')

    let created = 0
    for (let i = 0; i < count; i++) {
      const code = generateCode()
      try {
        await setDoc(doc(db, 'vouchers', code), {
          tier,
          redeemed:   false,
          redeemedBy: null,
          createdAt:  serverTimestamp(),
          expiresAt:  null,
        })
        created++
      } catch {}
    }

    showToast(`✓ ${created} ${tier} codes generated`)
  }

  function generateCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
    let code = ''
    for (let i = 0; i < 8; i++) {
      if (i === 4) code += '-'
      code += chars[Math.floor(Math.random() * chars.length)]
    }
    return code
  }

  // ── Disable voucher ──────────────────────────────────────────
  window.disableVoucher = async (code) => {
    try {
      await updateDoc(doc(db, 'vouchers', code), { redeemed: true, redeemedBy: 'disabled-by-admin' })
      showToast('Voucher disabled')
    } catch { showToast('Error disabling voucher') }
  }

  // ── Delete voucher ───────────────────────────────────────────
  window.confirmDelete = (code) => {
    confirmAction = async () => {
      try {
        await deleteDoc(doc(db, 'vouchers', code))
        showToast(`Deleted ${code}`)
      } catch { showToast('Error deleting') }
      closeConfirm()
    }
    document.getElementById('confirmTitle').textContent = `Delete ${code}?`
    document.getElementById('confirmSub').textContent   = 'This voucher will be permanently removed.'
    document.getElementById('confirmOkBtn').onclick     = confirmAction
    document.getElementById('confirmOverlay').classList.add('show')
  }

  window.closeConfirm = () => {
    document.getElementById('confirmOverlay').classList.remove('show')
    confirmAction = null
  }

  // ── Copy code ────────────────────────────────────────────────
  window.copyCode = (code) => {
    navigator.clipboard.writeText(code).then(() => showToast(`Copied ${code}`))
  }

  // ── Filters ──────────────────────────────────────────────────
  window.setFilter = (filter, btn) => {
    activeFilter = filter
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    renderTable()
  }

  window.searchFilter = (val) => {
    searchQuery = val
    renderTable()
  }

  // ── Toast ────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2600)
  }
</script>

</body>
</html>
